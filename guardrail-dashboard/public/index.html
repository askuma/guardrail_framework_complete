<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guardrail Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }
      body {
        background-color: #060d1f;
        background-image:
          radial-gradient(ellipse 900px 700px at 10% 20%, rgba(59,130,246,0.2) 0%, transparent 65%),
          radial-gradient(ellipse 700px 600px at 88% 80%, rgba(124,58,237,0.18) 0%, transparent 65%),
          radial-gradient(ellipse 550px 450px at 60% 5%,  rgba(16,185,129,0.1) 0%, transparent 60%),
          radial-gradient(ellipse 400px 350px at 30% 90%, rgba(245,158,11,0.07) 0%, transparent 60%);
        background-attachment: fixed;
        font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* Focus ring for keyboard navigation */
      :focus-visible { outline: 2px solid #60a5fa; outline-offset: 3px; border-radius: 3px; }
      :focus:not(:focus-visible) { outline: none; }

      /* Respect motion preferences */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition: none !important; animation: none !important; }
      }

      /* Table row hover */
      table tbody tr { transition: background-color 0.15s ease; }
      table tbody tr:hover { background-color: rgba(255,255,255,0.05); }

      /* Base transitions */
      button, a { transition: color 0.15s ease, background-color 0.15s ease, border-color 0.15s ease, opacity 0.15s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
