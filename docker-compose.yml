version: "3.9"

services:
  guardrail:
    build: .
    image: guardrail-framework:1.0
    container_name: guardrail
    ports:
      - "8000:8000"          # API  →  http://localhost:8000
                             # UI   →  http://localhost:8000  (same port)
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
