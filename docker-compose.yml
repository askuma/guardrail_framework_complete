

# Before starting: copy .env.example to .env and set GUARDRAIL_API_KEYS.
# GUARDRAIL_API_KEYS is required — the server will generate an ephemeral key
# on every restart if this is unset, which breaks existing clients.

services:
  guardrail:
    build: .
    image: guardrail-framework:1.0
    container_name: guardrail
    ports:
      - "8000:8000"          # API  →  http://localhost:8000
                             # UI   →  http://localhost:8000  (same port)
    env_file:
      - .env                 # Copy .env.example → .env and fill in values
    environment:
      # Store the database inside the named volume so data survives restarts.
      # This overrides GUARDRAIL_DB_URL from .env when running in Docker.
      - GUARDRAIL_DB_URL=sqlite:////app/data/guardrail.db
      - LOG_LEVEL=info
      # Optional: GuardrailsAI account token.  When set, the entrypoint installs
      # the ToxicLanguage hub validator at container start, giving the GuardrailsAI
      # backend real LLM01 (jailbreak/harmful-content) coverage.
      # Get your token at https://hub.guardrailsai.com
      - GUARDRAILS_TOKEN=${GUARDRAILS_TOKEN:-}
      # NeMo LLM provider — first non-empty key wins (see .env.example for all options)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - guardrail_data:/app/data
      - ./docs:/app/docs                          # benchmarks + latest_index.json persist on host
      - ./certs:/app/certs:ro
    dns:
      - 8.8.8.8    # Google — primary
      - 1.1.1.1    # Cloudflare — fallback
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  guardrail_data:
    driver: local
